<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Online Exam System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 fade-in">
<div class="container main-wrapper py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-sm-8 col-11">
            <div class="glass-card slide-up p-2 p-md-4">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <span style="font-size: 3rem;">📝</span>
                        <h3 class="mt-2 fw-bold text-dark">Student Registration</h3>
                        <p class="text-muted small">Create an account to take exams.</p>
                    </div>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                    {% for category, msg in messages %}
                    <div class="alert alert-{{ category }} fade-in">{{ msg }}</div>
                    {% endfor %}
                    {% endif %}
                    {% endwith %}

                    <form method="POST">
                        <div class="mb-3 delay-1 slide-up">
                            <label class="form-label text-muted fw-semibold small">Full Name</label>
                            <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
                        </div>
                        <div class="mb-3 delay-2 slide-up">
                            <label class="form-label text-muted fw-semibold small">Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                        </div>
                        <div class="mb-4 delay-3 slide-up">
                            <label class="form-label text-muted fw-semibold small">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Create a password" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-2 delay-4 slide-up">Register Account</button>
                    </form>
                    <p class="mt-4 text-center delay-4 slide-up text-muted">
                        Already registered? <a href="/login" class="text-decoration-none fw-bold text-primary">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
